services:
  webssh:
    build:
      context: .
      dockerfile: Dockerfile
    image: webssh:latest
    container_name: webssh
    restart: unless-stopped
    user: root
    init: true
    ports:
      - "6970:6970"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - WEBSSH_SERVER_HOST=0.0.0.0
      - WEBSSH_SERVER_PORT=6970
      - WEBSSH_JWT_SECRET=please-change-me-to-a-random-string
      - WEBSSH_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6970/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
